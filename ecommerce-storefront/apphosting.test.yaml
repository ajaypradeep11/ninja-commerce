# Firebase App Hosting — TEST environment overrides.
# The test backend is created with environment name "test"; App Hosting merges
# apphosting.yaml (base) with this file for that backend. Points the test
# storefront at the ninja-commerce-test Firebase project and the test Cloud Run
# API. Prod values stay in apphosting.yaml.

runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 2
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyC2yd_eQ0u1GapYnlpwBYoaO4rfs4fGdS4
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: ninja-commerce-test.firebaseapp.com
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: ninja-commerce-test
  - variable: NEXT_PUBLIC_USE_EMULATORS
    value: "false"

  # Test Cloud Run API URL (service ninja-commerce-api in project 808867399514).
  - variable: NEXT_PUBLIC_API_URL
    value: https://ninja-commerce-api-808867399514.us-east4.run.app
