<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="LocalNinja logo">
  <!-- Standalone animated LocalNinja mascot. Self-contained: the blink /
       glance animations live in this file, so it animates anywhere it's
       embedded - <img>, CSS background, or inline. Same geometry and
       timings as the hero mascot in index.html. -->
  <style>
    .eye {
      transform-box: fill-box;
      transform-origin: center;
      animation: blink 4.6s ease-in-out infinite;
    }
    .eyes {
      animation: glance 9s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 88%, 96%, 100% { transform: scaleY(1); }
      92%                { transform: scaleY(0.08); }
    }
    @keyframes glance {
      0%, 30%, 72%, 100% { transform: translateX(0); }
      36%, 48%           { transform: translateX(-14px); }
      54%, 66%           { transform: translateX(14px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .eye, .eyes { animation: none; }
    }
  </style>
  <defs>
    <clipPath id="badge">
      <circle cx="400" cy="400" r="400" />
    </clipPath>
    <filter id="glow">
      <!-- solid ~2px (at header size) yellow rim hugging the silhouette,
           then a soft glow fading out from it -->
      <feMorphology in="SourceAlpha" operator="dilate" radius="30" result="dilated" />
      <feFlood flood-color="#FFD84D" result="yellow" />
      <feComposite in="yellow" in2="dilated" operator="in" result="rim" />
      <feGaussianBlur in="rim" stdDeviation="11" result="soft" />
      <feMerge>
        <feMergeNode in="soft" />
        <feMergeNode in="rim" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g clip-path="url(#badge)">
    <!-- face on a transparent badge with a soft yellow glow instead of a
         solid yellow ring; scaled so the glow fades out before the clip -->
    <g filter="url(#glow)" transform="translate(400 400) scale(1.15) translate(-388 -420)">
      <!-- bandana tails -->
      <path
        d="M640 290 C700 270 758 288 782 316 C738 314 700 334 668 350 C656 328 648 308 640 290 Z"
        fill="#000"
      />
      <path
        d="M646 366 C706 366 760 390 780 424 C736 413 698 428 674 444 C662 418 652 390 646 366 Z"
        fill="#000"
      />
      <!-- head -->
      <circle cx="388" cy="420" r="300" fill="#000" />
      <!-- eye band -->
      <rect x="112" y="312" width="372" height="134" rx="67" fill="#E8BE8E" />
      <!-- eyes: .eyes glances side to side, each .eye blinks -->
      <g class="eyes">
        <g class="eye">
          <circle cx="207" cy="386" r="57" fill="#000" />
          <circle cx="185" cy="361" r="16" fill="#fff" />
          <circle cx="228" cy="409" r="8.5" fill="#fff" />
        </g>
        <g class="eye">
          <circle cx="388" cy="386" r="57" fill="#000" />
          <circle cx="366" cy="361" r="16" fill="#fff" />
          <circle cx="409" cy="409" r="8.5" fill="#fff" />
        </g>
      </g>
    </g>
  </g>
</svg>
