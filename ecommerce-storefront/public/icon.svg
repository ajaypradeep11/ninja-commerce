<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="LocalNinja">
  <!-- Favicon: the mascot, static. Browsers don't animate SVG favicons and
       render them at ~16-32px, so the blink/glance script and the ring's
       drop-shadow are dropped — both are invisible at this size and only
       cost bytes. The black tile matches the PNG siblings (icon.png /
       apple-icon.png, kept for Safari < 17 and iOS, which don't take SVG
       icons) so the tab and the installed app icon look the same. -->
  <rect width="800" height="800" fill="#000" />
  <!-- The art spans x 86-803 / y 86-714, so it overflows the right edge and
       sits high. This centres that box in the tile and shrinks it enough to
       keep the bandana tails off the edge. -->
  <g transform="translate(400 400) scale(0.95) translate(-444.5 -400)">
  <circle cx="400" cy="400" r="314" fill="none" stroke="#FFD84D" stroke-width="18" />
  <g transform="translate(12 -20)">
    <!-- bandana tails -->
    <path
      d="M640 290 C700 270 758 288 782 316 C738 314 700 334 668 350 C656 328 648 308 640 290 Z"
      fill="#000"
      stroke="#FFD84D"
      stroke-width="18"
    />
    <path
      d="M646 366 C706 366 760 390 780 424 C736 413 698 428 674 444 C662 418 652 390 646 366 Z"
      fill="#000"
      stroke="#FFD84D"
      stroke-width="18"
    />
    <circle cx="388" cy="420" r="300" fill="#000" />
    <rect x="112" y="312" width="372" height="134" rx="67" fill="#E8BE8E" />
    <g>
      <circle cx="207" cy="386" r="57" fill="#000" />
      <circle cx="185" cy="361" r="16" fill="#fff" />
      <circle cx="228" cy="409" r="8.5" fill="#fff" />
    </g>
    <g>
      <circle cx="388" cy="386" r="57" fill="#000" />
      <circle cx="366" cy="361" r="16" fill="#fff" />
      <circle cx="409" cy="409" r="8.5" fill="#fff" />
    </g>
  </g>
  </g>
</svg>
